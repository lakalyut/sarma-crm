name: Deploy (sarma-crm)

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/sarma-crm

            git fetch --all
            git reset --hard origin/main

            sudo docker compose up -d db

            sudo docker compose exec -T db bash -lc 'until pg_isready -U sarma -d sarma; do sleep 1; done'

            mkdir -p /home/ubuntu/sarma_backups
            sudo docker compose exec -T db pg_dump -U sarma sarma | gzip > "/home/ubuntu/sarma_backups/backup_$(date +%F_%H-%M-%S).sql.gz"

            find /home/ubuntu/sarma_backups -type f -name "backup_*.sql.gz" -mtime +14 -delete

            sudo docker compose build web

            sudo docker compose run --rm web alembic upgrade head

            sudo docker compose up -d --build --remove-orphans

            curl -fsS http://127.0.0.1/health >/dev/null

            sudo docker image prune -f