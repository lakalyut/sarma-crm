<style>
    :root {
        --bg-page: #f5f7fb;
        --surface: #ffffff;
        --border: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #64748b;

        --primary: #3478ff;
        --primary-hover: #255de0;

        --pastel-blue:   #e8f3ff;
        --pastel-cyan:   #e6fcff;
        --pastel-yellow: #fff7c7;
        --pastel-red:    #ffe5eb;
        --pastel-purple: #f2e9ff;
        --pastel-green:  #e8ffe8;

        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --shadow-soft: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: var(--bg-page);
        color: var(--text-main);
        font-family: 'Comfortaa', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
    }

    a {
        color: var(--primary);
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    .topbar {
        min-height: 56px;
        background: #ffffff;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.03);
    }

    .topbar-title {
        font-weight: 600;
        font-size: 16px;
        margin-right: 32px;
        white-space: nowrap;
    }

    .topbar-nav {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
    }

    .topbar-nav a {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid transparent;
        transition: 0.15s;
    }

    .topbar-nav a:hover {
        background: #eef2ff;
    }

    .topbar-nav a.active {
        background: var(--primary);
        color: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 2px 6px rgba(37, 99, 235, 0.35);
    }

    .app-shell {
        padding: 16px 24px 32px;
    }

    .card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        padding: 18px 20px 20px;
        box-shadow: var(--shadow-soft);
    }

    h1 {
        font-size: 20px;
        margin: 0 0 16px;
    }

    form .field {
        margin-bottom: 10px;
    }

    label,
    .field label {
        font-size: 13px;
        color: var(--text-muted);
        display: block;
        margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea,
    select {
        width: 100%;
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        outline: none;
        background: #ffffff;
        font-family: inherit;
        min-height: 42px;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }

    button,
    a.btn {
        border: none;
        border-radius: 999px;
        background: var(--primary);
        color: #fff;
        padding: 8px 18px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        box-shadow: 0 2px 6px rgba(37, 99, 235, 0.35);
        transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
        min-height: 42px;
        flex: 0 0 auto;
    }

    button:hover,
    a.btn:hover {
        background: var(--primary-hover);
        text-decoration: none;
        transform: translateY(-1px);
        box-shadow: 0 3px 8px rgba(37, 99, 235, 0.35);
    }

    button:active,
    a.btn:active {
        transform: translateY(0);
        box-shadow: 0 1px 4px rgba(37, 99, 235, 0.25);
    }

    .btn-secondary,
    a.btn-secondary {
        background: #e5e7eb;
        color: var(--text-main);
        box-shadow: none;
    }

    .btn-secondary:hover,
    a.btn-secondary:hover {
        background: #d4d4d8;
    }

    .flex-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
    }

    .filters-card {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
        margin-bottom: 16px;
        border: 1px solid var(--border);
    }

    .filters-grid {
        display: grid;
        gap: 18px;
    }

    .clients-filters-grid {
        grid-template-columns: 1.25fr 1fr 1fr 1fr auto;
        align-items: start;
    }

    .filter-field {
        margin-bottom: 0;
        min-width: 0;
    }

    .filter-field-region-search {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .filter-field-region-search input[type="text"] {
        margin-bottom: 6px;
    }

    .filter-field .multiselect,
    .filter-field input[type="text"],
    .filter-field input[type="email"],
    .filter-field input[type="password"],
    .filter-field input[type="number"],
    .filter-field select,
    .filter-field .multiselect-display {
        width: 100%;
    }

    .month-checkbox input[type="checkbox"] {
        width: auto;
        min-height: auto;
        margin: 0;
        flex: 0 0 auto;
        accent-color: var(--primary);
    }

    .filter-field .multiselect {
        min-width: 0;
    }

    .multiselect {
        position: relative;
    }

    .multiselect-display {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #fff;
        padding: 8px 12px;
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
    }

    .multiselect-text {
        font-size: 13px;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .multiselect-arrow {
        font-size: 10px;
        color: var(--text-muted);
        margin-left: 8px;
        flex: 0 0 auto;
    }

    .multiselect-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        box-shadow: var(--shadow-soft);
        padding: 6px 8px;
        max-height: 260px;
        overflow: auto;
        min-width: 100%;
        z-index: 100;
        display: none;
    }

    .multiselect.open .multiselect-dropdown {
        display: block;
    }

    .month-checkboxes {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .month-checkbox {
        font-size: 12px;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 6px;
        border-radius: 6px;
        border: 1px solid transparent;
    }

    .month-checkbox:hover {
        background: #f1f5f9;
        border-color: var(--border);
    }

    .month-checkbox input {
        margin: 0;
        accent-color: var(--primary);
    }

    .filters-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-start;
        flex-wrap: nowrap;
        white-space: nowrap;
        min-height: 42px;
    }

    .filter-actions-row {
        min-width: 0;
    }

    .search-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow-soft);
        max-height: 260px;
        overflow-y: auto;
        z-index: 300;
        padding: 6px;
    }

    .search-dropdown-item {
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-main);
        transition: background 0.15s ease;
    }

    .search-dropdown-item:hover {
        background: #eef2ff;
    }

    .search-dropdown-item.hidden {
        display: none;
    }

    .selected-city-text {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.2;
        min-height: 18px;
        display: flex;
        align-items: center;
        white-space: nowrap;
    }

    .selected-city-value {
        color: var(--primary);
        font-weight: 600;
        margin-left: 4px;
    }

    .summary-panel {
        margin-top: 8px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: #f8fafc;
        padding: 8px 12px 10px;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
    }

    .summary-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .summary-panel-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
    }

    .summary-toggle {
        border: none;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        background: #e5edff;
        color: #1d4ed8;
        box-shadow: none;
        min-height: auto;
    }

    .summary-toggle:hover {
        background: #dbeafe;
    }

    .summary-panel-body.summary-collapsed {
        display: none;
    }

    .summary-cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 8px;
    }

    .summary-card {
        min-height: 96px;
        padding: 14px 16px;
        border-radius: 14px;
        box-shadow: var(--shadow-soft);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .summary-card.clients    { background: var(--pastel-blue); }
    .summary-card.qty        { background: var(--pastel-cyan); }
    .summary-card.weight     { background: var(--pastel-yellow); }
    .summary-card.sku        { background: var(--pastel-red); }
    .summary-card.sku-total  { background: var(--pastel-purple); }
    .summary-card.sku-avg    { background: #efe7ff; }
    .summary-card.type       { background: #ece9ff; }

    .summary-card-title {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
    }

    .summary-card-value {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-main);
    }

    .sheet-wrapper {
        margin-top: 12px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        overflow: hidden;
        background: #fff;
        box-shadow: var(--shadow-soft);
    }

    .sheet-scroller {
        max-height: 70vh;
        overflow: auto;
    }

    table.sheet-table {
        border-collapse: separate;
        border-spacing: 0;
        width: 100%;
        font-size: 12px;
        table-layout: fixed;
    }

    #clients-table th:nth-child(1),
    #clients-table td:nth-child(1) {
        width: 140px;
        min-width: 140px;
        max-width: 140px;
    }

    #clients-table th:nth-child(2),
    #clients-table td:nth-child(2) {
        width: 52%;
    }

    #clients-table td:nth-child(2),
    #clients-table th:nth-child(2) {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    #clients-table td:last-child {
    white-space: nowrap;
    }

    #clients-table td:last-child .btn {
        min-width: 92px;
    }

    #clients-table td:last-child > a.btn {
        margin-right: 8px;
    }

    #clients-table td {
        height: 52px;
    }

    #clients-table th:nth-child(3),
    #clients-table td:nth-child(3) {
        width: 100px;
        min-width: 100px;
        max-width: 100px;
    }

    #clients-table th:nth-child(4),
    #clients-table td:nth-child(4) {
        width: 70px;
        min-width: 70px;
        max-width: 70px;
    }

    #clients-table th:nth-child(5),
    #clients-table td:nth-child(5) {
        width: 70px;
        min-width: 70px;
        max-width: 70px;
    }

    #clients-table th:nth-child(6),
    #clients-table td:nth-child(6) {
        width: 250px;
        min-width: 250px;
        max-width: 250px;
    }

    table.sheet-table th,
    table.sheet-table td {
        border-bottom: 1px solid var(--border);
        border-right: 1px solid var(--border);
        padding: 6px 8px;
        background: #fff;
        vertical-align: top;
    }

    table.sheet-table th:first-child,
    table.sheet-table td:first-child {
        border-left: 1px solid var(--border);
    }

    table.sheet-table th {
        background: var(--pastel-blue);
        font-weight: 500;
        color: var(--text-muted);
        text-align: left;
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 5;
        box-shadow: 0 1px 0 var(--border);
    }

    table.sheet-table tbody tr:nth-child(even) td {
        background: #fafbff;
    }

    table.sheet-table tbody tr:hover td {
        background: #eef2ff;
    }

    .message {
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 13px;
    }

    .message.ok {
        border: 1px solid #81c995;
        background: #e6f4ea;
    }

    .message.error {
        border: 1px solid #f97373;
        background: #fee2e2;
    }

    .chart-wrap {
        position: relative;
        height: 420px;
        width: 100%;
        padding: 12px;
    }

    .chart-block {
        margin-top: 4px;
    }

    .sheet-table th.sortable {
        cursor: pointer;
        user-select: none;
        transition: 0.15s;
    }

    .sheet-table th.sortable:hover {
        background: #dbeafe;
    }

    .sort-icon {
        font-size: 11px;
        margin-left: 4px;
        color: var(--text-muted);
    }

    .sheet-table th.sort-active {
        color: var(--primary);
    }

    .sheet-table th.filter-active .th-filter-trigger {
        color: var(--primary);
        font-weight: 600;
    }

    .sheet-table th.filterable-th {
            position: sticky;
            top: 0;
            z-index: 6;
        }

        .th-filter-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .th-filter-trigger:hover {
            color: var(--primary);
        }

        .th-filter-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 8px;
            min-width: 220px;
            max-width: 280px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            padding: 10px;
            z-index: 50;
            display: none;
        }

        .th-filter-dropdown.open {
            display: block;
        }

        .th-filter-title {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .th-filter-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .th-filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-main);
            padding: 4px 6px;
            border-radius: 8px;
            cursor: pointer;
        }

        .th-filter-option:hover {
            background: #f1f5f9;
        }

        .th-filter-option input[type="checkbox"] {
            width: auto;
            min-height: auto;
            margin: 0;
            flex: 0 0 auto;
            accent-color: var(--primary);
        }

        .th-filter-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-small {
            min-height: 32px;
            padding: 6px 12px;
            font-size: 12px;
        }

    @media (max-width: 900px) {
        .summary-cards {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 768px) {
        .app-shell {
            padding: 12px;
        }

        .topbar {
            padding: 0 12px;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        .topbar-title {
            margin-right: 0;
        }

        .clients-filters-grid {
            grid-template-columns: 1fr;
        }

        .filters-actions {
            flex-wrap: wrap;
            white-space: normal;
        }

        table.sheet-table th,
        table.sheet-table td {
            font-size: 11px;
        }
    }

    @media (max-width: 520px) {
        .summary-cards {
            grid-template-columns: 1fr;
        }
    }

    .charts-filters-grid {
    grid-template-columns: 1.2fr 1fr 1fr 1.2fr 1fr auto;
    align-items: start;
}

    @media (max-width: 1400px) {
        .charts-filters-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .charts-filters-grid .filter-actions-row {
            grid-column: 1 / -1;
        }
    }

    @media (max-width: 1280px) {
        .clients-filters-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .filter-actions-row {
            grid-column: 1 / -1;
        }
    }

</style>
