{% extends "base_auth.html" %}

{% block content %}
<div style="max-width: 520px; margin: 0 auto;">

<div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin: 4px 0 18px;">
    <svg viewBox="0 0 48 48" width="40" height="40"><rect x="8" y="26" width="5" height="12" fill="#a3a3a3"></rect><rect x="16" y="16" width="5" height="22" fill="#a3a3a3"></rect><rect x="24" y="21" width="5" height="17" fill="#a3a3a3"></rect><rect x="32" y="10" width="5" height="28" fill="#a3a3a3"></rect><polyline points="8,32 16,20 24,25 32,10" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"></polyline><circle cx="32" cy="10" r="2.8" fill="var(--primary)"></circle></svg>
    <span style="font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: var(--text-main);">Пульс</span>
</div>

<h1>Вход</h1>

{% include "includes/messages.html" %}

<form method="post" action="/auth/login">
  <div class="field">
    <label for="email">Email</label>
    <input id="email" name="email" type="text" required autocomplete="username" autofocus>
  </div>

  <div class="field">
    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
  </div>

  <div class="flex-row" style="justify-content: flex-end; margin-top: 12px;">
    <button type="submit">Войти</button>
  </div>
</form>
</div>
{% endblock %}
