{% extends "base_auth.html" %}
{% block content %}
<div class="card-narrow">

  <div class="brand-header">
      <svg viewBox="0 0 48 48" width="40" height="40"><rect x="8" y="26" width="5" height="12" fill="#a3a3a3"></rect><rect x="16" y="16" width="5" height="22" fill="#a3a3a3"></rect><rect x="24" y="21" width="5" height="17" fill="#a3a3a3"></rect><rect x="32" y="10" width="5" height="28" fill="#a3a3a3"></rect><polyline points="8,32 16,20 24,25 32,10" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"></polyline><circle cx="32" cy="10" r="2.8" fill="var(--primary)"></circle></svg>
      <span class="brand-header-title">Пульс</span>
  </div>

  <h1>Установка пароля</h1>

  {% include "includes/messages.html" %}

  <form method="post" action="/auth/set-password">
    <input type="hidden" name="token" value="{{ token }}">

    <div class="field">
      <label for="password">Новый пароль</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
    </div>

    <div class="field">
      <label for="password2">Повторите пароль</label>
      <input id="password2" name="password2" type="password" required minlength="8" autocomplete="new-password">
    </div>

    <div class="flex-row actions-split">
      <a class="btn btn-secondary" href="/auth/login">Назад</a>
      <button type="submit">Сохранить</button>
    </div>
  </form>
</div>
{% endblock %}
