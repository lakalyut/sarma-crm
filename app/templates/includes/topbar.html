<div class="topbar">
    <div class="topbar-left">
        <div class="topbar-title">Сарма База Данных Клиентов</div>
    </div>

    <button
        type="button"
        class="topbar-burger"
        id="topbar-burger"
        aria-label="Открыть меню"
        aria-expanded="false"
    >
        ☰
    </button>

    <div class="topbar-nav-wrap" id="topbar-nav-wrap">
        <nav class="topbar-nav">
            <a href="/admin/users" class="{% if request.url.path == '/admin/users' %}active{% endif %}">Пользователи</a>
            <a href="/admin/products" class="{% if request.url.path == '/admin/products' %}active{% endif %}">Номенклатуры</a>
            <a href="/import-xlsx" class="{% if request.url.path == '/import-xlsx' %}active{% endif %}">Импорт XLSX</a>
            <a href="/admin/unmatched" class="{% if request.url.path == '/admin/unmatched' %}active{% endif %}">Несопоставленные</a>
            <a href="/admin/imports/delete" class="{% if request.url.path == '/admin/imports/delete' %}active{% endif %}">Удаление импорта</a>
            <a href="/analytics/clients" class="{% if request.url.path == '/analytics/clients' %}active{% endif %}">Клиенты</a>
            <a href="/analytics/charts" class="{% if request.url.path == '/analytics/charts' %}active{% endif %}">Графики</a>
            <a href="/analytics/ambassadors" class="{% if request.url.path == '/analytics/ambassadors' %}active{% endif %}">Амбассадорские отчеты</a>
            <form method="post" action="/auth/logout" class="topbar-logout-form">
                <button type="submit" class="topbar-logout">
                    Выйти
                </button>
            </form>
        </nav>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const burger = document.getElementById("topbar-burger");
    const navWrap = document.getElementById("topbar-nav-wrap");

    if (!burger || !navWrap) return;

    burger.addEventListener("click", function () {
        const isOpen = navWrap.classList.toggle("open");
        burger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        burger.textContent = isOpen ? "✕" : "☰";
    });

    document.addEventListener("click", function (e) {
        if (!navWrap.contains(e.target) && e.target !== burger) {
            navWrap.classList.remove("open");
            burger.setAttribute("aria-expanded", "false");
            burger.textContent = "☰";
        }
    });
});
</script>
