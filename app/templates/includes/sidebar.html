                <span class="sidebar-nav-text">Графики</span>

                <span class="sidebar-nav-text">Амбассадорские отчеты</span>
            </a>
        </div>

        {% if current_user and current_user.role == "admin" %}

                <div class="sidebar-nav-label">Админ</div>
                <a href="/admin/products" class="sidebar-nav-link {% if request.url.path == '/admin/products' %}active{% endif %}" title="Номенклатуры">
                    <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    <span class="sidebar-nav-text">Номенклатуры</span>
                </a>
                <a href="/admin/abc" class="sidebar-nav-link {% if request.url.path == '/admin/abc' %}active{% endif %}" title="ABC-рейтинг">
                    <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
                    <span class="sidebar-nav-text">ABC-рейтинг</span>
                </a>
                <a href="/import-xlsx" class="sidebar-nav-link {% if request.url.path == '/import-xlsx' %}active{% endif %}" title="Импорт XLSX">

                    <span class="sidebar-nav-text">Импорт XLSX</span>
                </a>
                <a href="/admin/unmatched" class="sidebar-nav-link {% if request.url.path == '/admin/unmatched' %}active{% endif %}" title="Несопоставленные">
                    <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    <span class="sidebar-nav-text">Несопоставленные</span>
                </a>
                <a href="/admin/imports/delete" class="sidebar-nav-link {% if request.url.path == '/admin/imports/delete' %}active{% endif %}" title="Удаление импорта">
                    <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    <span class="sidebar-nav-text">Удаление импорта</span>
                </a>
                <a href="/admin/users" class="sidebar-nav-link {% if request.url.path == '/admin/users' %}active{% endif %}" title="Пользователи">
                    <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span class="sidebar-nav-text">Пользователи</span>
                </a>
            </div>
        {% endif %}
    </nav>

    <div class="sidebar-footer">
        {% if current_user %}
            <div class="sidebar-user-email" title="{{ current_user.email }}">{{ current_user.email }}</div>
        {% endif %}
        <form method="post" action="/auth/logout" class="sidebar-logout-form">
            <button type="submit" class="sidebar-logout" title="Выйти">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="sidebar-nav-text">Выйти</span>
            </button>
        </form>
    </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const burger = document.getElementById("sidebar-burger");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    const collapseToggle = document.getElementById("sidebar-collapse-toggle");

    if (burger && sidebar && overlay) {
        function closeSidebar() {
            sidebar.classList.remove("open");
            overlay.classList.remove("open");
            burger.setAttribute("aria-expanded", "false");
        }

        function openSidebar() {
            sidebar.classList.add("open");
            overlay.classList.add("open");
            burger.setAttribute("aria-expanded", "true");
        }

        burger.addEventListener("click", function () {
            if (sidebar.classList.contains("open")) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        overlay.addEventListener("click", closeSidebar);

        sidebar.querySelectorAll("a").forEach(function (link) {
            link.addEventListener("click", closeSidebar);
        });
    }

    if (collapseToggle) {
        collapseToggle.addEventListener("click", function () {
            const collapsed = document.documentElement.classList.toggle("sidebar-collapsed");
            try {
                localStorage.setItem("sidebarCollapsed", collapsed ? "1" : "0");
            } catch (e) {
                console.warn("Не удалось сохранить состояние меню:", e);
            }
            collapseToggle.setAttribute("title", collapsed ? "Развернуть меню" : "Свернуть меню");
            collapseToggle.setAttribute("aria-label", collapsed ? "Развернуть меню" : "Свернуть меню");
        });
    }
});
</script>
