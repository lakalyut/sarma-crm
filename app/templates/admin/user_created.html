{% extends "base.html" %}
{% block content %}
<div style="max-width: 720px; margin: 0 auto;">
  <h1>Пользователь создан</h1>

  <div class="message ok">
    Email: <b>{{ email }}</b><br>
    Роль: <b>{{ role }}</b>
  </div>

  <div class="field" style="margin-top: 12px;">
    <label>Ссылка для установки пароля (отправь пользователю)</label>
    <input type="text" value="{{ link }}" readonly onclick="this.select()">
    <div class="filter-summary">Кликни по полю — выделится вся ссылка.</div>
  </div>

  <div class="flex-row" style="justify-content: space-between; margin-top: 12px;">
    <a class="btn btn-secondary" href="/admin/users">К списку пользователей</a>
    <a class="btn" href="/admin/users/new">Создать ещё</a>
  </div>
</div>
{% endblock %}
