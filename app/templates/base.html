<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Пульс" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

{% include "_styles.html" %}   
</head>
<body>
<script>
(function () {
    try {
        if (localStorage.getItem("sidebarCollapsed") === "1") {
            document.documentElement.classList.add("sidebar-collapsed");
        }
    } catch (e) {}
})();
</script>
<div class="app-layout">
    {% include "includes/sidebar.html" %}

    <div class="app-main">
        <div class="mobile-topbar">
            <button
                type="button"
                class="sidebar-burger"
                id="sidebar-burger"
                aria-label="Открыть меню"
                aria-expanded="false"
            >
                ☰
            </button>
            <span class="mobile-topbar-title">Пульс</span>
        </div>

        <div class="app-shell">
            <div class="card">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
<script src="/static/js/checkbox_multiselect.js"></script>
</body>
</html>
